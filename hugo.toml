baseURL = "https://musclelove-777.github.io/fitness-affiliate-blog/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "MuscleLove セクシー筋肉美女ナビ"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[sitemap]
  changefreq = "daily"
  priority = 0.7

[params]
googleAnalyticsID = "G-YV53HTHVY2"
  canonicalURL = true
  env = "production"
  description = "MuscleLoveが厳選する筋肉質な美女・マッスル女優のセクシー動画を毎日お届け。フィットネス系AVの最新作品をサンプル動画付きで紹介。"
  author = "MuscleLove"
  images = ["https://musclelove-777.github.io/fitness-affiliate-blog/favicon.svg"]
  keywords = ["筋肉 AV", "マッスル女優", "フィットネス AV", "筋肉質 女優", "腹筋 美女", "筋肉美女", "セクシー フィットネス"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "MuscleLove"
    Content = "MuscleLoveが厳選する筋肉質な美女のセクシー動画。毎日更新、サンプル動画付き！"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

  [[params.socialIcons]]
    name = "linktree"
    url = "https://linktr.ee/ILoveMyCats"

[params.assets]
  favicon = "favicon.svg"
  favicon16x16 = "favicon.svg"
  favicon32x32 = "favicon.svg"
  apple_touch_icon = "favicon.svg"
  safari_pinned_tab = "favicon.svg"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  linkFullImages = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[[menus.main]]
  name = "検索"
  url = "/search/"
  weight = 10

[[menus.main]]
  name = "カテゴリ"
  url = "/categories/"
  weight = 20

[[menus.main]]
  name = "タグ"
  url = "/tags/"
  weight = 30

[[menus.main]]
  name = "アーカイブ"
  url = "/archives/"
  weight = 40
